<p-card [header]="groupName()">
  <div class="toolbar">
    <p-breadcrumb [model]="breadcrumbModel()" [home]="undefined" />
    <div class="actions">
      @if (canWrite()) {
        <p-button label="New folder" icon="pi pi-folder-plus" (onClick)="showCreateFolderDialog()" />
        <input #fileInput type="file" hidden (change)="onFileSelected($event)" />
        <p-button
          label="Upload"
          icon="pi pi-upload"
          [loading]="loading()"
          (onClick)="fileInput.click()"
        />
      }
    </div>
  </div>

  <p-table [value]="items()" [loading]="loading()" dataKey="id" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Size</th>
        <th class="actions-col">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td>
          @if (item.isFolder) {
            <button type="button" class="folder-link" (click)="openFolder(item)">
              <i class="pi pi-folder"></i>
              {{ item.name }}
            </button>
          } @else {
            <button type="button" class="file-link" (click)="openFile(item)">
              <i class="pi pi-file"></i>
              {{ item.name }}
            </button>
          }
        </td>
        <td>
          <p-tag [value]="item.isFolder ? 'Folder' : 'File'" [severity]="item.isFolder ? 'info' : 'secondary'" />
        </td>
        <td>{{ formatSize(item.size) }}</td>
        <td>
          <div class="row-actions">
            <p-button
              class="action-btn action-download"
              icon="pi pi-download"
              [text]="true"
              [class.action-placeholder]="item.isFolder"
              [disabled]="item.isFolder"
              (onClick)="download(item); $event.stopPropagation()"
            />
            <p-button
              class="action-btn"
              icon="pi pi-ellipsis-v"
              [text]="true"
              [rounded]="true"
              severity="secondary"
              [class.action-placeholder]="!canShowRowMenu(item)"
              [disabled]="!canShowRowMenu(item)"
              (onClick)="openRowMenu($event, item)"
            />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4">This folder is empty.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<p-dialog
  header="New folder"
  [visible]="folderDialogVisible()"
  (visibleChange)="folderDialogVisible.set($event)"
  [modal]="true"
  [style]="{ width: '24rem' }"
>
  <input pInputText class="w-full" [ngModel]="newFolderName()" (ngModelChange)="newFolderName.set($event)" placeholder="Folder name" />
  <ng-template pTemplate="footer">
    <p-button label="Cancel" [text]="true" (onClick)="folderDialogVisible.set(false)" />
    <p-button label="Create" (onClick)="createFolder()" />
  </ng-template>
</p-dialog>

<p-dialog
  header="Share file"
  [visible]="shareDialogVisible()"
  (visibleChange)="shareDialogVisible.set($event)"
  [modal]="true"
  [style]="{ width: '28rem' }"
  [contentStyle]="{ overflow: 'visible' }"
>
  @if (!shareUrl()) {
    <div class="share-form">
      <label class="share-label" for="group-share-expiry">Link expires</label>
      <p-select
        inputId="group-share-expiry"
        class="w-full"
        appendTo="body"
        [options]="shareExpiryOptions"
        optionLabel="label"
        optionValue="value"
        [ngModel]="shareExpiryPreset()"
        (ngModelChange)="shareExpiryPreset.set($event)"
      />
      <p class="share-hint">Access: Viewer (read-only)</p>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancel" [text]="true" (onClick)="shareDialogVisible.set(false)" />
      <p-button
        label="Create link"
        icon="pi pi-link"
        [loading]="creatingShare()"
        (onClick)="createShare()"
      />
    </ng-template>
  } @else {
    <div class="share-result">
      <p class="share-hint">{{ shareExpiryLabel() }}</p>
      <div class="share-url-row">
        <input pInputText class="share-url-input" [value]="shareUrl()!" readonly />
        <p-button
          icon="pi pi-copy"
          severity="secondary"
          [rounded]="true"
          aria-label="Copy link"
          (onClick)="copyShareUrl()"
        />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Close" (onClick)="shareDialogVisible.set(false)" />
    </ng-template>
  }
</p-dialog>

<p-menu #rowMenu [model]="rowMenuItems()" [popup]="true" appendTo="body" />
