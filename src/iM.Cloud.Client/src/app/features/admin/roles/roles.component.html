<im-generic-table
  [columns]="columns"
  [dataSource]="loadRoles"
  [config]="tableConfig"
>
  <h2 tableHeader>Roles</h2>

  <p-button
    tableButtons
    label="New role"
    icon="pi pi-plus"
    (onClick)="openCreate()"
  />

  <ng-template imCellTemplate="active" let-row>
    <p-tag
      [severity]="row.active ? 'success' : 'danger'"
      [value]="row.active ? 'Active' : 'Inactive'"
    />
  </ng-template>

  <ng-template imCellTemplate="actions" let-row>
    <div class="roles-actions">
      <p-button
        icon="pi pi-key"
        [text]="true"
        [rounded]="true"
        severity="info"
        (onClick)="openPermissions(row); $event.stopPropagation()"
      />
      <p-button
        icon="pi pi-pencil"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        [loading]="editLoading()"
        (onClick)="openEdit(row); $event.stopPropagation()"
      />
      <p-button
        icon="pi pi-trash"
        [text]="true"
        [rounded]="true"
        severity="danger"
        (onClick)="confirmDelete(row); $event.stopPropagation()"
      />
    </div>
  </ng-template>
</im-generic-table>

<app-role-form-dialog
  [(visible)]="dialogVisible"
  [role]="editingRole()"
  (saved)="onSaved()"
/>

<app-role-permissions-dialog
  [(visible)]="permDialogVisible"
  [role]="permissionsRole()"
/>
