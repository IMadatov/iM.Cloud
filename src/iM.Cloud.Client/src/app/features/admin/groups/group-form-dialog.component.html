<p-dialog
  [header]="dialogHeader"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [closable]="!loading()"
  [draggable]="false"
  [style]="{ width: '28rem' }"
  (onHide)="close()"
>
  <form class="group-form" [formGroup]="form" (ngSubmit)="submit()">
    <label for="group-name">Name</label>
    <input
      pInputText
      id="group-name"
      type="text"
      formControlName="name"
      autocomplete="off"
      class="full-width"
    />

    <label for="group-description">Description</label>
    <textarea
      pTextarea
      id="group-description"
      formControlName="description"
      rows="3"
      class="full-width"
    ></textarea>

    @if (isEdit) {
      <div class="group-form__active">
        <label for="group-active">Active</label>
        <p-toggleswitch inputId="group-active" formControlName="active" />
      </div>
    }

    <div class="group-form__actions">
      <p-button
        type="button"
        label="Cancel"
        severity="secondary"
        [text]="true"
        [disabled]="loading()"
        (onClick)="close()"
      />
      <p-button
        type="submit"
        [label]="isEdit ? 'Save' : 'Create'"
        [loading]="loading()"
        [disabled]="form.invalid || loading()"
      />
    </div>
  </form>
</p-dialog>
